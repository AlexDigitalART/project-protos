syntax = "proto3";
package task;

option go_package = "github.com/AlexDigitalART/project-protos/proto/tasks;taskpb";

message Task {
  uint32 id = 1;
  uint32 user_id = 2;
  string title = 3;
  bool is_done = 4;
}

message CreateTaskRequest {
  uint32 user_id = 1;
  string title = 2;
}
message CreateTaskResponse { Task task = 1; }

message GetTaskRequest { uint32 id = 1; }
message GetTaskResponse { Task task = 1; }

message ListTasksRequest {}
message ListTasksResponse { repeated Task tasks = 1; }

message ListTasksByUserRequest { uint32 user_id = 1; }

message UpdateTaskRequest {
  uint32 id = 1;
  uint32 user_id = 2;
  string title = 3;
  bool is_done = 4;
}
message UpdateTaskResponse { Task task = 1; }

message DeleteTaskRequest { uint32 id = 1; }
message DeleteTaskResponse { bool success = 1; }

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ListTasksByUser(ListTasksByUserRequest) returns (ListTasksResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
}