syntax = "proto3";
package user;
option go_package = "github.com/your-org/project-protos/proto/user";

// Сущность пользователь (минимум полей)
message User {
  uint32 id    = 1;
  string email = 2;
}

// Запрос на создание
message CreateUserRequest  { string email = 1; }
message CreateUserResponse { User user = 1; }

// Получение одного
message GetUserRequest  { uint32 id = 1; }

// Список всех
message ListUsersRequest  {}
message ListUsersResponse { repeated User users = 1; }

// Обновление
message UpdateUserRequest  { uint32 id = 1; string email = 2; }
message UpdateUserResponse { User user = 1; }

// Удаление
message DeleteUserRequest  { uint32 id = 1; }
message DeleteUserResponse { bool success = 1; }

service UserService {
  rpc CreateUser (CreateUserRequest)  returns (CreateUserResponse);
  rpc GetUser    (User)               returns (User);
  rpc ListUsers  (ListUsersRequest)   returns (ListUsersResponse);
  rpc UpdateUser (UpdateUserRequest)  returns (UpdateUserResponse);
  rpc DeleteUser (DeleteUserRequest)  returns (DeleteUserResponse);
}
